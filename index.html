<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Blocks access to websites (as per keywords user specifies) to improve productivity." />
    <!-- Single Consolidated Stylesheet -->
    <link rel="stylesheet" href="./styles/style.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <title>KEY BLOCKER</title>
  </head>
  <body>
    <!-- Ambient glowing orbs -->
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="tool-bar">
      <div class="icon-container">
        <img alt="logo" height="24px" width="24px" src="./assets/logo/logo24.png" />
        <span class="extension-name"><strong>KEY BLOCKER</strong></span>
      </div>
      <button class="tab-icon-container" type="button" id="activeTabIcon" title="Block this site">
        <img alt="tab" height="20px" width="20px" id="tabIcon" />
      </button>
    </div>
    
    <div id="incognitoMsg" class="incognito-wran-msg">
      <span class="material-icons">security</span><span>Please enable Incognito access for overall monitoring</span>
    </div>
    
    <div class="form-container">
      <input type="text" class="form-control" id="keyWordInput" placeholder="Type a keyword to block..." />
      <button type="button" class="bttn" id="addKeywords" title="Add to blacklist">
        <span class="material-icons"> add </span>
      </button>
    </div>
    
    <div id="blackListDesc" class="list-desc-at-blocked">
      Active Blocked Keywords
    </div>
    
    <div id="blackListContainer" class="container-for-words"></div>
    
    <script src="./scripts/script.js"></script>
  </body>
</html>
