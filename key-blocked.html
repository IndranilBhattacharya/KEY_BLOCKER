<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="When sites are blocked user gets redirected to this page" />
    <link rel="stylesheet" href="./styles/blocked.css" />
    <title>Access Blocked</title>
  </head>
  <body>
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>
    
    <div class="main-container">
      <div class="glass-card">
        <div class="icon-container">
          <svg class="shield-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path class="shield-cross" d="M15 9L9 15M9 9L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        
        <h1 class="title">Access Restricted</h1>
        <p class="subtitle">This page was blocked to maintain your productivity goals.</p>
        
        <div class="divider"></div>
        
        <div class="keywords-section">
          <h2 class="section-title">Blocked Keywords Detected</h2>
          <div id="keywordContainer" class="keyword-container">
            <!-- Badges will be injected here by blocked.js -->
          </div>
        </div>
        
        <button class="back-btn" id="closeTabBtn">Close Tab</button>
      </div>
    </div>

    <script src="./scripts/blocked.js"></script>
  </body>
</html>
